<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>محرم کی تفصیلات — اسٹک مین کی زبانی</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F6F3EC;
    --frame: #FFFFFF;
    --ink: #2B2A27;
    --muted: #6E6B63;
    --accent: #2F5048;
    --accent-soft: #E4ECE9;
    --border: #E2DDD2;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px 16px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Tahoma, system-ui, sans-serif;
    color: var(--ink);
  }
  .page { width: 100%; max-width: 560px; }
  h1 {
    font-family: 'Noto Nastaliq Urdu', serif;
    font-size: 26px;
    font-weight: 700;
    text-align: center;
    margin: 0 0 6px;
    color: var(--accent);
  }
  .subtitle {
    text-align: center;
    font-size: 13px;
    color: var(--muted);
    margin: 0 0 22px;
  }
  .frame {
    position: relative;
    background: var(--frame);
    border: 1px solid var(--border);
    border-radius: 18px;
    overflow: hidden;
  }
  .progress-track {
    height: 4px;
    background: var(--border);
    width: 100%;
  }
  .progress-fill {
    height: 100%;
    width: 0%;
    background: var(--accent);
    transition: width 0.1s linear;
  }
  .stage {
    display: flex;
    gap: 20px;
    align-items: center;
    flex-wrap: wrap;
    padding: 26px 24px;
  }
  .figure-wrap { flex-shrink: 0; width: 110px; }
  .bubble {
    position: relative;
    flex: 1;
    min-width: 220px;
    background: var(--accent-soft);
    border-radius: 14px;
    padding: 18px 20px;
  }
  .bubble::before {
    content: "";
    position: absolute;
    left: -7px;
    top: 26px;
    width: 14px;
    height: 14px;
    background: var(--accent-soft);
    transform: rotate(45deg);
  }
  .bubble p {
    margin: 0;
    font-family: 'Noto Nastaliq Urdu', serif;
    font-size: 19px;
    line-height: 2;
    color: var(--ink);
    transition: opacity 0.25s ease;
    min-height: 110px;
  }
  .overlay {
    position: absolute;
    inset: 0;
    background: rgba(246, 243, 236, 0.92);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .overlay.hidden { display: none; }
  .play-btn {
    font-family: inherit;
    font-size: 15px;
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 14px 28px;
    border-radius: 999px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .play-btn:hover { opacity: 0.92; }
  .triangle {
    width: 0; height: 0;
    border-top: 7px solid transparent;
    border-bottom: 7px solid transparent;
    border-right: 10px solid #fff;
  }
  .controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    margin-top: 20px;
    flex-wrap: wrap;
  }
  button.nav {
    font-family: inherit;
    font-size: 14px;
    background: var(--frame);
    border: 1px solid var(--border);
    color: var(--ink);
    padding: 8px 16px;
    border-radius: 999px;
    cursor: pointer;
  }
  button.nav:hover { background: var(--accent-soft); border-color: var(--accent); }
  button.nav:disabled { opacity: 0.4; cursor: default; }
  .dots { display: flex; gap: 7px; }
  .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--border); border: none; cursor: pointer; padding: 0;
  }
  .dot.active { background: var(--accent); }
  .arm { transform-origin: 70px 58px; animation: wave 1.6s ease-in-out infinite; }
  @keyframes wave { 0%, 100% { transform: rotate(0deg); } 50% { transform: rotate(-22deg); } }
  @media (prefers-reduced-motion: reduce) { .arm { animation: none; } }
  footer {
    text-align: center;
    font-size: 12px;
    color: var(--muted);
    margin-top: 16px;
  }
</style>
</head>
<body>
<div class="page">
  <h1>محرم کی تفصیلات</h1>
  <p class="subtitle">اسٹک مین کی زبانی — صوتی بیان کے ساتھ</p>
  <div class="frame" id="frame">
    <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
    <div class="stage">
      <div class="figure-wrap">
        <svg viewBox="0 0 140 160" width="100%" height="auto">
          <circle cx="70" cy="30" r="16" fill="none" stroke="var(--accent)" stroke-width="4"/>
          <ellipse id="mouth" cx="70" cy="36" rx="5" ry="1.5" fill="var(--accent)"/>
          <line x1="70" y1="46" x2="70" y2="108" stroke="var(--accent)" stroke-width="4" stroke-linecap="round"/>
          <line x1="70" y1="108" x2="48" y2="150" stroke="var(--accent)" stroke-width="4" stroke-linecap="round"/>
          <line x1="70" y1="108" x2="92" y2="150" stroke="var(--accent)" stroke-width="4" stroke-linecap="round"/>
          <line x1="70" y1="58" x2="42" y2="86" stroke="var(--accent)" stroke-width="4" stroke-linecap="round"/>
          <g class="arm">
            <line x1="70" y1="58" x2="102" y2="36" stroke="var(--accent)" stroke-width="4" stroke-linecap="round"/>
          </g>
        </svg>
      </div>
      <div class="bubble">
        <p id="slide-text"></p>
      </div>
    </div>
    <div class="overlay" id="start-overlay">
      <button class="play-btn" id="start-btn"><span class="triangle"></span>ویڈیو چلائیں</button>
    </div>
    <div class="overlay hidden" id="end-overlay">
      <button class="play-btn" id="replay-btn"><span class="triangle"></span>دوبارہ دیکھیں</button>
    </div>
  </div>
  <div class="controls">
    <button class="nav" id="prev-btn">پچھلا</button>
    <button class="nav" id="playpause-btn">روکیں</button>
    <div class="dots" id="dots"></div>
    <button class="nav" id="mute-btn">خاموش</button>
    <button class="nav" id="next-btn">اگلا</button>
  </div>
  <footer>صوتی بیان خودکار طور پر چلتا اور آگے بڑھتا ہے</footer>
</div>

];

  let idx = 0;
  let isPlaying = false;
  let muted = false;
  let mouthOpen = false;
  let mouthTimer = null;
  const audioEl = new Audio();
  const textEl = document.getElementById('slide-text');
  const dotsEl = document.getElementById('dots');
  const fillEl = document.getElementById('progress-fill');
  const mouthEl = document.getElementById('mouth');
  const startOverlay = document.getElementById('start-overlay');
  const endOverlay = document.getElementById('end-overlay');
  const playPauseBtn = document.getElementById('playpause-btn');
  const muteBtn = document.getElementById('mute-btn');

  slides.forEach((s, i) => {
    const d = document.createElement('button');
    d.className = 'dot' + (i === 0 ? ' active' : '');
    d.setAttribute('aria-label', 'سلائیڈ ' + (i + 1));
    d.addEventListener('click', () => loadSlide(i, true));
    dotsEl.appendChild(d);
  });

  function updateDots() {
    Array.from(dotsEl.children).forEach((d, i) => d.classList.toggle('active', i === idx));
  }

  function startMouth() {
    if (mouthTimer) clearInterval(mouthTimer);
    mouthTimer = setInterval(() => {
      mouthOpen = !mouthOpen;
      mouthEl.setAttribute('ry', mouthOpen ? '4.5' : '1.5');
    }, 170);
  }
  function stopMouth() {
    if (mouthTimer) clearInterval(mouthTimer);
    mouthEl.setAttribute('ry', '1.5');
  }

  function loadSlide(i, autoplay) {
    idx = (i + slides.length) % slides.length;
    textEl.style.opacity = 0;
    fillEl.style.width = '0%';
    setTimeout(() => {
      textEl.textContent = slides[idx].text;
      textEl.style.opacity = 1;
    }, 120);
    updateDots();
    audioEl.pause();
    audioEl.src = slides[idx].audio;
    audioEl.muted = muted;
    if (autoplay) {
      audioEl.play().then(() => { isPlaying = true; playPauseBtn.textContent = 'روکیں'; startMouth(); }).catch(() => {});
    }
  }

  audioEl.addEventListener('timeupdate', () => {
    if (audioEl.duration) fillEl.style.width = ((audioEl.currentTime / audioEl.duration) * 100) + '%';
  });
  audioEl.addEventListener('ended', () => {
    stopMouth();
    if (idx < slides.length - 1) {
      loadSlide(idx + 1, true);
    } else {
      isPlaying = false;
      endOverlay.classList.remove('hidden');
    }
  });

  document.getElementById('start-btn').addEventListener('click', () => {
    startOverlay.classList.add('hidden');
    loadSlide(0, true);
  });
  document.getElementById('replay-btn').addEventListener('click', () => {
    endOverlay.classList.add('hidden');
    loadSlide(0, true);
  });
  document.getElementById('prev-btn').addEventListener('click', () => {
    endOverlay.classList.add('hidden');
    loadSlide(idx - 1, isPlaying);
  });
  document.getElementById('next-btn').addEventListener('click', () => {
    endOverlay.classList.add('hidden');
    loadSlide(idx + 1, isPlaying);
  });
  playPauseBtn.addEventListener('click', () => {
    if (startOverlay.classList.contains('hidden') === false) return;
    if (isPlaying) {
      audioEl.pause();
      isPlaying = false;
      playPauseBtn.textContent = 'چلائیں';
      stopMouth();
    } else {
      audioEl.play().then(() => { isPlaying = true; playPauseBtn.textContent = 'روکیں'; startMouth(); }).catch(() => {});
    }
  });
  muteBtn.addEventListener('click', () => {
    muted = !muted;
    audioEl.muted = muted;
    muteBtn.textContent = muted ? 'آواز' : 'خاموش';
  });

  textEl.textContent = slides[0].text;
</script>
